<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herkimer Tip Split Ledger</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS for processing Excel and raw CSV timesheet templates -->
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Verdana', 'Geneva', 'sans-serif'],
          },
          colors: {
            brand: {
              accent: '#6BA5B8',       // Muted Teal Accent
              light: '#EDEFEC',        // Cool Linen Background
              dark: '#483728',         // Deep Roast Brown
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Swiss Style Reset & Base */
    body {
      background-color: #EDEFEC;
      color: #483728;
      font-family: 'Verdana', 'Geneva', sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.2;
    }
    input, select, textarea, button {
      font-family: 'Verdana', 'Geneva', sans-serif;
      border-radius: 0 !important; /* Strict sharp corners */
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Strict Grid Borders */
    .swiss-border {
      border: 1px solid #483728;
    }
    .swiss-border-b {
      border-bottom: 1px solid #483728;
    }
    .swiss-border-t {
      border-top: 1px solid #483728;
    }
    .swiss-border-l {
      border-left: 1px solid #483728;
    }
    .swiss-border-r {
      border-right: 1px solid #483728;
    }
    .swiss-border-b-heavy {
      border-bottom: 4px solid #483728;
    }
    .swiss-border-t-heavy {
      border-top: 4px solid #483728;
    }

    /* Form Input overrides */
    input[type="number"], input[type="text"], input[type="date"], select {
      border-radius: 0;
      background-color: #FFFFFF;
      transition: all 0s; /* Remove transition smoothing for stark feel */
    }
    input:focus, select:focus {
      outline: none;
      background-color: #E2E6E4; /* Slight functional shift on focus */
      border-color: #6BA5B8 !important;
    }

    @media print {
      .no-print {
        display: none !important;
      }
      body {
        background-color: white !important;
        font-size: 10px;
      }
      .print-card {
        page-break-inside: avoid;
        border: 1px solid #483728 !important;
        margin-bottom: 2rem !important;
      }
    }
  </style>
</head>
<body class="font-sans text-brand-dark">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const DAY_NAMES = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

    // Date Utilities
    function normalizeDateString(str) {
      if (!str) return null;
      let clean = str.trim().replace(/['"]/g, '').replace(/\s+/g, ' ');
      
      let m = clean.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
      if (m) {
        let year = m[3];
        if (year.length === 2) year = "20" + year;
        return `${year}-${String(m[1]).padStart(2, '0')}-${String(m[2]).padStart(2, '0')}`;
      }
      
      m = clean.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (m) {
        return `${m[1]}-${String(m[2]).padStart(2, '0')}-${String(m[3]).padStart(2, '0')}`;
      }
      
      const months = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec"];
      let cleanFuzzy = clean.toLowerCase().replace(/,/g, '').trim();
      let parts = cleanFuzzy.split(/\s+/);
      if (parts.length >= 3) {
        let monthIdx = months.findIndex(mName => parts[0].startsWith(mName));
        if (monthIdx !== -1) {
          let monthStr = String(monthIdx + 1).padStart(2, '0');
          let dayStr = String(parseInt(parts[1], 10)).padStart(2, '0');
          let yearStr = parts[2];
          if (yearStr.length === 2) yearStr = "20" + yearStr;
          if (yearStr.length === 4) {
            return `${yearStr}-${monthStr}-${dayStr}`;
          }
        }
      }
      return null;
    }

    function dateDiff(d1Str, d2Str) {
      const [y1,m1,D1] = d1Str.split('-').map(Number);
      const [y2,m2,D2] = d2Str.split('-').map(Number);
      const a = new Date(y1, m1-1, D1);
      const b = new Date(y2, m2-1, D2);
      return Math.round((b - a) / 86400000);
    }

    // Unified Robust Parser
    function parseFileToRows(file, callback) {
      const reader = new FileReader();
      const isCSV = file.name.toLowerCase().endsWith('.csv');

      if (isCSV) {
        reader.onload = (e) => {
          const text = e.target.result;
          const lines = text.split(/\r?\n/);
          const rows = lines.map(line => {
            const result = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
              const char = line[i];
              if (char === '"') {
                inQuotes = !inQuotes;
              } else if (char === ',' && !inQuotes) {
                result.push(current.trim().replace(/^"|"$/g, ''));
                current = "";
              } else {
                current += char;
              }
            }
            result.push(current.trim().replace(/^"|"$/g, ''));
            return result;
          });
          callback(rows);
        };
        reader.readAsText(file);
      } else {
        reader.onload = (e) => {
          try {
            const data = e.target.result;
            const workbook = XLSX.read(data, { type: 'binary' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            callback(rows);
          } catch (err) {
            console.error(err);
            alert("Error reading spreadsheet format.");
          }
        };
        reader.readAsBinaryString(file);
      }
    }

    function App() {
      const [startDate, setStartDate] = useState(() => {
        const d = new Date();
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff)).toISOString().split('T')[0];
      });
      const [periodLength, setPeriodLength] = useState(7);
      const [shopName, setShopName] = useState("Herkimer Coffee");
      
      const [dailyTips, setDailyTips] = useState({});
      const [dailyShifts, setDailyShifts] = useState({});

      const [activeTab, setActiveTab] = useState("all"); 
      const [toast, setToast] = useState(null);
      const [showResetModal, setShowResetModal] = useState(false);

      const [tipsFileName, setTipsFileName] = useState("");
      const [hoursFileName, setHoursFileName] = useState("");

      const [squareHover, setSquareHover] = useState(false);
      const [homebaseHover, setHomebaseHover] = useState(false);

      const triggerToast = (message, type = "success") => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const formatLocalDateString = (isoStr) => {
        if (!isoStr) return "";
        const [year, month, day] = isoStr.split('-').map(Number);
        const dObj = new Date(year, month - 1, day);
        return dObj.toLocaleDateString('en-US', {
          weekday: 'long',
          month: 'long',
          day: 'numeric',
          year: 'numeric'
        });
      };

      const handleSquareTipsImport = (file) => {
        if (!file) return;
        parseFileToRows(file, (rows) => {
          let salesRow = null;
          let tipRow = null;

          for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;
            const firstVal = String(row[0]).trim();
            if (firstVal === "Sales" && row.slice(1).some(cell => String(cell).includes("/") || String(cell).includes("-"))) {
              salesRow = row;
            } else if (firstVal === "Tip" && row.length > 1) {
              tipRow = row;
            }
          }

          let validDates = [];
          let parsedTips = {};

          if (salesRow && tipRow) {
            for (let colIdx = 1; colIdx < salesRow.length; colIdx++) {
              const dateRaw = salesRow[colIdx];
              const normalizedDate = normalizeDateString(String(dateRaw));
              if (normalizedDate) {
                validDates.push(normalizedDate);
                const rawVal = tipRow[colIdx] || "0";
                parsedTips[normalizedDate] = String(parseFloat(String(rawVal).replace(/[^0-9.]/g, '')) || 0);
              }
            }
          } else {
            let dateColIdx = -1;
            let tipColIdx = -1;
            for (let i = 0; i < rows.length; i++) {
              const row = rows[i];
              if (!row) continue;
              for (let c = 0; c < row.length; c++) {
                const val = String(row[c]).toLowerCase();
                if (val.includes("date") || val.includes("day")) dateColIdx = c;
                if (val.includes("tip") || val.includes("gratuity")) tipColIdx = c;
              }
              if (dateColIdx !== -1 && tipColIdx !== -1) {
                for (let r = i + 1; r < rows.length; r++) {
                  const dataRow = rows[r];
                  if (!dataRow || !dataRow[dateColIdx]) continue;
                  const normalizedDate = normalizeDateString(String(dataRow[dateColIdx]));
                  if (normalizedDate) {
                    validDates.push(normalizedDate);
                    parsedTips[normalizedDate] = String(parseFloat(String(dataRow[tipColIdx]).replace(/[^0-9.]/g, '')) || 0);
                  }
                }
                break;
              }
            }
          }

          if (validDates.length > 0) {
            validDates.sort();
            const d1 = validDates[0];
            const d2 = validDates[validDates.length - 1];
            const diff = dateDiff(d1, d2);
            
            const newLength = diff <= 8 ? 7 : 14;

            setStartDate(d1);
            setPeriodLength(newLength);
            setDailyTips(prev => ({ ...prev, ...parsedTips }));
            setTipsFileName(file.name);
            triggerToast(`Successfully loaded tip pools and updated date range.`);
          } else {
            triggerToast("No readable dates in CSV.", "error");
          }
        });
      };

      const handleHomebaseHoursImport = (file) => {
        if (!file) return;
        parseFileToRows(file, (rows) => {
          let nameIdx = -1;
          let dateIdx = -1;
          let hrsIdx = -1;
          let clockInIdx = -1;
          let clockOutIdx = -1;

          const hoursByDateAndName = {};

          const shopRow = rows[0];
          if (shopRow && shopRow[0] && typeof shopRow[0] === 'string') {
            const possibleShop = shopRow[0].split('-')[0].trim();
            if (possibleShop) setShopName(possibleShop);
          }
          const periodRow = rows.find(r => String(r[0]).toLowerCase().includes('payroll period'));
          if (periodRow && periodRow[1]) {
            const parts = String(periodRow[1]).toLowerCase().split(' to ');
            if (parts.length === 2) {
              const d1 = normalizeDateString(parts[0]);
              const d2 = normalizeDateString(parts[1]);
              if (d1 && d2) {
                setStartDate(d1);
                const diff = dateDiff(d1, d2) + 1;
                setPeriodLength(diff > 7 ? 14 : 7);
              }
            }
          }

          for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            if (!row) continue;

            const isHeaderRow = row.some(cell => {
              const val = String(cell).toLowerCase();
              return val.includes("clock in date") || val.includes("actual hours");
            });

            if (isHeaderRow) {
              for (let c = 0; c < row.length; c++) {
                const val = String(row[c]).toLowerCase().trim();
                if (val === "name" || val === "employee" || val.includes("employee name")) nameIdx = c;
                if (val === "clock in date" || val === "work date" || val === "date" || val.includes("date")) dateIdx = c;
                if (val === "actual hours" || val === "hours worked" || val === "hours" || val.includes("hours")) hrsIdx = c;
                if (val === "clock in time" || val === "in time") clockInIdx = c;
                if (val === "clock out time" || val === "out time") clockOutIdx = c;
              }
              continue;
            }

            if (nameIdx !== -1 && dateIdx !== -1 && hrsIdx !== -1) {
              const name = String(row[nameIdx] || "").trim();
              const rawDate = String(row[dateIdx] || "");
              const hrsVal = parseFloat(String(row[hrsIdx] || "").replace(/[^0-9.]/g, '')) || 0;

              const nameLower = name.toLowerCase();
              if (!name || nameLower.includes("total") || nameLower === "name" || nameLower === "employee" || nameLower.includes("unnamed")) {
                continue;
              }

              const normalizedDate = normalizeDateString(rawDate);
              const timeIn = clockInIdx !== -1 ? String(row[clockInIdx] || "").trim() : "";
              const timeOut = clockOutIdx !== -1 ? String(row[clockOutIdx] || "").trim() : "";
              const shiftLabel = (timeIn && timeOut) ? `${timeIn}-${timeOut}` : "Shift";

              if (normalizedDate && hrsVal > 0) {
                if (!hoursByDateAndName[normalizedDate]) hoursByDateAndName[normalizedDate] = [];
                hoursByDateAndName[normalizedDate].push({ name, hrs: hrsVal, shift: shiftLabel });
              }
            }
          }

          let loadedShiftsCount = 0;
          setDailyShifts(prev => {
            const next = { ...prev };
            for (const [dateIso, workers] of Object.entries(hoursByDateAndName)) {
              const generatedShifts = workers.map((w, sIdx) => {
                loadedShiftsCount++;
                return {
                  id: `${dateIso}-imp-${sIdx}-${Date.now()}`,
                  shift: w.shift,
                  hrs: w.hrs,
                  name: w.name
                };
              });
              next[dateIso] = generatedShifts;
            }
            return next;
          });

          if (loadedShiftsCount > 0) {
            setHoursFileName(file.name);
            triggerToast(`Generated ${loadedShiftsCount} shifts.`);
          } else {
            triggerToast("No shifts found in timesheet.", "error");
          }
        });
      };

      const updateShift = (isoDate, shiftId, field, value) => {
        setDailyShifts(prev => {
          const dayShifts = prev[isoDate] || [];
          return {
            ...prev,
            [isoDate]: dayShifts.map(s => s.id === shiftId ? { ...s, [field]: value } : s)
          };
        });
      };

      const addCustomShift = (isoDate) => {
        setDailyShifts(prev => {
          const dayShifts = prev[isoDate] || [];
          return {
            ...prev,
            [isoDate]: [...dayShifts, { id: `${isoDate}-${Date.now()}`, shift: "Custom Shift", hrs: 0, name: "" }]
          };
        });
      };

      const deleteShift = (isoDate, shiftId) => {
        setDailyShifts(prev => {
          const dayShifts = prev[isoDate] || [];
          return {
            ...prev,
            [isoDate]: dayShifts.filter(s => s.id !== shiftId)
          };
        });
      };

      const handleTipChange = (isoDate, val) => {
        setDailyTips(prev => ({ ...prev, [isoDate]: val === "" ? "0" : val }));
      };

      const handleResetAll = () => {
        setDailyTips({});
        setDailyShifts({});
        setTipsFileName("");
        setHoursFileName("");
        setShowResetModal(false);
      };

      const processedDays = useMemo(() => {
        const dates = [];
        const baseDate = new Date(startDate + "T00:00:00");

        for (let i = 0; i < periodLength; i++) {
          const temp = new Date(baseDate);
          temp.setDate(baseDate.getDate() + i);
          
          const y = temp.getFullYear();
          const m = String(temp.getMonth() + 1).padStart(2, '0');
          const d = String(temp.getDate()).padStart(2, '0');
          const iso = `${y}-${m}-${d}`;
          
          const dayName = DAY_NAMES[temp.getDay()];
          const tipsVal = parseFloat(dailyTips[iso]) || 0;
          const shifts = dailyShifts[iso] || [];
          const totalHours = shifts.reduce((acc, s) => acc + (parseFloat(s.hrs) || 0), 0);
          
          let isBalanced = true;
          let totalPaidOut = 0;
          let calculatedShifts = shifts.map(s => ({ ...s, payout: 0 }));

          if (totalHours > 0 && tipsVal > 0) {
            let cumulativeHrs = 0;
            let prevCumulPayout = 0;
            calculatedShifts = shifts.map(shift => {
               const hrs = parseFloat(shift.hrs) || 0;
               cumulativeHrs += hrs;
               const currentCumulPayout = Math.round((tipsVal * cumulativeHrs / totalHours) * 100) / 100;
               const shiftPayout = Math.round((currentCumulPayout - prevCumulPayout) * 100) / 100;
               prevCumulPayout = currentCumulPayout;
               return { ...shift, payout: shiftPayout };
            });
            totalPaidOut = calculatedShifts.reduce((acc, s) => acc + s.payout, 0);
            isBalanced = Math.abs(totalPaidOut - tipsVal) < 0.001;
          }

          dates.push({
            dateIso: iso,
            dayLabel: dayName,
            shifts: calculatedShifts,
            totalHours,
            tipsVal,
            isBalanced,
            totalPaidOut
          });
        }
        return dates;
      }, [startDate, periodLength, dailyTips, dailyShifts]);

      const totals = useMemo(() => {
        let week1Sum = 0;
        let week2Sum = 0;
        processedDays.forEach((day, index) => {
          if (index < 7) week1Sum += day.tipsVal;
          else week2Sum += day.tipsVal;
        });
        return {
          week1: week1Sum,
          week2: week2Sum,
          grandTotal: week1Sum + week2Sum
        };
      }, [processedDays]);

      const payrollAggregation = useMemo(() => {
        const recordMap = {};
        let unnamedTotalPayout = 0;
        let unnamedTotalHours = 0;

        processedDays.forEach(day => {
          day.shifts.forEach(shift => {
            const hrs = parseFloat(shift.hrs) || 0;
            const payout = shift.payout || 0;
            const normalizedName = shift.name.trim();

            if (normalizedName) {
              if (!recordMap[normalizedName]) {
                recordMap[normalizedName] = { name: normalizedName, totalHours: 0, totalPayout: 0, shiftsCount: 0 };
              }
              recordMap[normalizedName].totalHours += hrs;
              recordMap[normalizedName].totalPayout += payout;
              recordMap[normalizedName].shiftsCount += 1;
            } else {
              unnamedTotalHours += hrs;
              unnamedTotalPayout += payout;
            }
          });
        });

        return {
          baristas: Object.values(recordMap).sort((a, b) => a.name.localeCompare(b.name)),
          unnamed: { totalHours: unnamedTotalHours, totalPayout: unnamedTotalPayout }
        };
      }, [processedDays]);

      const onDragOverSquare = (e) => { e.preventDefault(); setSquareHover(true); };
      const onDragLeaveSquare = () => setSquareHover(false);
      const onDropSquare = (e) => {
        e.preventDefault();
        setSquareHover(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) handleSquareTipsImport(e.dataTransfer.files[0]);
      };

      const onDragOverHomebase = (e) => { e.preventDefault(); setHomebaseHover(true); };
      const onDragLeaveHomebase = () => setHomebaseHover(false);
      const onDropHomebase = (e) => {
        e.preventDefault();
        setHomebaseHover(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) handleHomebaseHoursImport(e.dataTransfer.files[0]);
      };

      const handleExportCSV = () => {
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += `${shopName} TIP POOL LEDGER\n`;
        csvContent += `PERIOD: ${formatLocalDateString(processedDays[0]?.dateIso)} - ${formatLocalDateString(processedDays[processedDays.length - 1]?.dateIso)}\n\n`;
        csvContent += "BARISTA,HOURS,PAYOUT,RATE\n";
        
        payrollAggregation.baristas.forEach(b => {
          const rate = b.totalHours > 0 ? (b.totalPayout / b.totalHours).toFixed(2) : "0.00";
          csvContent += `"${b.name}",${b.totalHours.toFixed(2)},${b.totalPayout.toFixed(2)},${rate}\n`;
        });
        if (payrollAggregation.unnamed.totalPayout > 0) {
          csvContent += `"UNNAMED",${payrollAggregation.unnamed.totalHours.toFixed(2)},${payrollAggregation.unnamed.totalPayout.toFixed(2)},-\n`;
        }
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `${shopName}_Tips_${startDate}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleCopyClipboard = () => {
        let txt = `${shopName.toUpperCase()} TIP SUMMARY\n`;
        txt += `PERIOD: ${formatLocalDateString(processedDays[0]?.dateIso)} - ${formatLocalDateString(processedDays[processedDays.length - 1]?.dateIso)}\n`;
        txt += `-----------------------------------\n`;
        txt += `TOTAL DISBURSED: $${totals.grandTotal.toFixed(2)}\n`;
        txt += `-----------------------------------\n\n`;
        txt += `PAYROLL:\n`;
        payrollAggregation.baristas.forEach(b => {
          txt += `${b.name}: ${b.totalHours.toFixed(2)}h  $${b.totalPayout.toFixed(2)}\n`;
        });
        if (payrollAggregation.unnamed.totalPayout > 0) {
          txt += `UNASSIGNED: ${payrollAggregation.unnamed.totalHours.toFixed(2)}h  $${payrollAggregation.unnamed.totalPayout.toFixed(2)}\n`;
        }
        const textArea = document.createElement("textarea");
        textArea.value = txt;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          triggerToast("DATA COPIED TO CLIPBOARD");
        } catch (err) {
          triggerToast("CLIPBOARD ERROR", "error");
        }
        document.body.removeChild(textArea);
      };

      useEffect(() => {
        if (periodLength === 7 && activeTab === "week2") setActiveTab("all");
      }, [periodLength, activeTab]);

      return (
        <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
          <div className="w-full max-w-6xl grid grid-cols-12 gap-x-6 gap-y-12">
            
            {/* Toast System */}
            {toast && (
              <div className="fixed top-6 right-6 z-50 px-4 py-3 bg-white swiss-border flex items-center">
                <div className={`w-3 h-3 mr-3 ${toast.type === 'error' ? 'bg-red-600' : 'bg-brand-accent'}`}></div>
                <span className="text-xs font-bold uppercase tracking-widest">{toast.message}</span>
              </div>
            )}

            {/* Reset Modal */}
            {showResetModal && (
              <div className="fixed inset-0 bg-brand-light/90 z-50 flex items-center justify-center p-4">
                <div className="bg-white max-w-sm w-full p-8 swiss-border shadow-none">
                  <h3 className="text-xl uppercase tracking-tighter font-bold mb-4">CLEAR DATA</h3>
                  <p className="text-sm mb-8">This action will remove all imported records and manual inputs.</p>
                  <div className="flex gap-4">
                    <button 
                      onClick={() => setShowResetModal(false)}
                      className="flex-1 px-4 py-3 text-xs font-bold uppercase tracking-widest swiss-border hover:bg-brand-light transition-colors"
                    >
                      CANCEL
                    </button>
                    <button 
                      onClick={handleResetAll}
                      className="flex-1 px-4 py-3 text-xs font-bold uppercase tracking-widest bg-brand-dark text-white hover:bg-black transition-colors"
                    >
                      CONFIRM
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Header (Span 12) */}
            <header className="col-span-12 swiss-border-b-heavy pb-6 flex flex-col md:flex-row md:items-end justify-between gap-6 no-print">
              <div>
                <h1 className="text-4xl md:text-6xl font-bold tracking-tighter uppercase leading-none text-brand-dark mb-2">
                  {shopName}
                </h1>
                <p className="text-xs font-bold uppercase tracking-widest text-brand-accent">
                  Tip Split Ledger System
                </p>
              </div>
              <div className="flex gap-4">
                <button 
                  onClick={() => window.print()}
                  className="swiss-border bg-white text-brand-dark hover:bg-brand-dark hover:text-white transition-colors px-6 py-3 text-xs font-bold uppercase tracking-widest"
                >
                  PRINT
                </button>
                <button 
                  onClick={() => setShowResetModal(true)}
                  className="swiss-border bg-brand-dark text-white hover:bg-black transition-colors px-6 py-3 text-xs font-bold uppercase tracking-widest"
                >
                  RESET
                </button>
              </div>
            </header>

            {/* Config & Dropzones (Span 12, inner grid) */}
            <section className="col-span-12 grid grid-cols-12 gap-6 no-print">
              
              {/* Configuration Modules */}
              <div className="col-span-12 md:col-span-4 flex flex-col gap-6">
                <div className="swiss-border bg-white p-6">
                  <label className="block text-[10px] font-bold uppercase tracking-widest mb-4">PERIOD LENGTH</label>
                  <select
                    value={periodLength}
                    onChange={(e) => setPeriodLength(Number(e.target.value))}
                    className="w-full bg-transparent swiss-border-b px-0 py-2 text-xl font-bold focus:outline-none cursor-pointer"
                  >
                    <option value={7}>1 WEEK</option>
                    <option value={14}>2 WEEKS</option>
                  </select>
                </div>
                <div className="swiss-border bg-white p-6">
                  <label className="block text-[10px] font-bold uppercase tracking-widest mb-4">START DATE</label>
                  <input 
                    type="date" 
                    value={startDate}
                    onChange={(e) => setStartDate(e.target.value)}
                    className="w-full bg-transparent swiss-border-b px-0 py-2 text-xl font-bold focus:outline-none"
                  />
                </div>
              </div>

              {/* Upload Dropzones */}
              <div className="col-span-12 md:col-span-4">
                <div 
                  onDragOver={onDragOverSquare}
                  onDragLeave={onDragLeaveSquare}
                  onDrop={onDropSquare}
                  className={`h-full bg-white p-6 swiss-border flex flex-col justify-between transition-colors ${squareHover ? 'bg-brand-accent/20' : ''}`}
                >
                  <div>
                    <div className="flex justify-between items-start mb-4">
                      <span className="text-[10px] font-bold uppercase tracking-widest text-brand-accent">IMPORT 1</span>
                      {tipsFileName && <span className="w-2 h-2 bg-brand-accent rounded-none"></span>}
                    </div>
                    <h3 className="text-2xl font-bold tracking-tighter uppercase leading-none mb-2">SQUARE<br/>REPORT</h3>
                    {tipsFileName && <p className="text-[10px] uppercase font-bold tracking-widest mt-4 truncate">{tipsFileName}</p>}
                  </div>
                  <label className="mt-8 cursor-pointer swiss-border bg-brand-light text-brand-dark hover:bg-brand-dark hover:text-white transition-colors text-[10px] font-bold uppercase tracking-widest py-3 px-4 text-center block">
                    SELECT FILE
                    <input type="file" accept=".csv, .xlsx, .xls" onChange={(e) => handleSquareTipsImport(e.target.files[0])} className="hidden" />
                  </label>
                </div>
              </div>

              <div className="col-span-12 md:col-span-4">
                <div 
                  onDragOver={onDragOverHomebase}
                  onDragLeave={onDragLeaveHomebase}
                  onDrop={onDropHomebase}
                  className={`h-full bg-white p-6 swiss-border flex flex-col justify-between transition-colors ${homebaseHover ? 'bg-brand-accent/20' : ''}`}
                >
                  <div>
                    <div className="flex justify-between items-start mb-4">
                      <span className="text-[10px] font-bold uppercase tracking-widest text-brand-accent">IMPORT 2</span>
                      {hoursFileName && <span className="w-2 h-2 bg-brand-accent rounded-none"></span>}
                    </div>
                    <h3 className="text-2xl font-bold tracking-tighter uppercase leading-none mb-2">HOMEBASE<br/>HOURS</h3>
                    {hoursFileName && <p className="text-[10px] uppercase font-bold tracking-widest mt-4 truncate">{hoursFileName}</p>}
                  </div>
                  <label className="mt-8 cursor-pointer swiss-border bg-brand-light text-brand-dark hover:bg-brand-dark hover:text-white transition-colors text-[10px] font-bold uppercase tracking-widest py-3 px-4 text-center block">
                    SELECT FILE
                    <input type="file" accept=".xlsx, .xls, .csv" onChange={(e) => handleHomebaseHoursImport(e.target.files[0])} className="hidden" />
                  </label>
                </div>
              </div>

            </section>

            {/* DAILY POOLS STRIP (Span 12) */}
            <section className="col-span-12 mb-12 no-print">
              <div className="swiss-border-b-heavy pb-4 mb-6 flex justify-between items-end">
                <h2 className="text-3xl font-bold uppercase tracking-tighter leading-none">DAILY POOLS</h2>
                <div className="text-right">
                  <span className="block text-[10px] font-bold uppercase tracking-widest text-brand-accent mb-1">TOTAL SUM</span>
                  <span className="text-2xl font-bold leading-none">${totals.grandTotal.toFixed(2)}</span>
                </div>
              </div>

              <div className={`grid grid-cols-2 md:grid-cols-4 ${periodLength === 7 ? 'lg:grid-cols-7' : 'lg:grid-cols-7'} gap-0 swiss-border bg-brand-dark`}>
                {processedDays.map((day, index) => {
                  const shortDate = day.dateIso ? day.dateIso.split('-').slice(1).join('.') : "";
                  return (
                    <div key={`tip-${index}`} className={`bg-white p-4 border-[0.5px] border-brand-dark flex flex-col justify-between ${index >= 7 && periodLength === 7 ? 'hidden' : ''}`}>
                      <div className="flex justify-between items-start mb-4">
                        <span className="text-[10px] font-bold uppercase tracking-widest">{day.dayLabel.slice(0,3)}</span>
                        <span className="text-[10px] font-bold uppercase tracking-widest text-brand-accent">{shortDate}</span>
                      </div>
                      <div className="relative">
                        <span className="absolute left-0 top-1/2 -translate-y-1/2 text-sm font-bold">$</span>
                        <input 
                          type="number"
                          step="0.01"
                          min="0"
                          placeholder="0.00"
                          value={dailyTips[day.dateIso] === "0" || !dailyTips[day.dateIso] ? "" : dailyTips[day.dateIso]}
                          onChange={(e) => handleTipChange(day.dateIso, e.target.value)}
                          className="w-full bg-transparent swiss-border-b pl-4 pr-0 py-1 text-lg font-bold"
                        />
                      </div>
                    </div>
                  );
                })}
              </div>
            </section>

            {/* TAB NAVIGATION & VIEW CONTROLS */}
            <section className="col-span-12 mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6 no-print swiss-border-t pt-8">
              <div className="flex flex-wrap gap-2">
                <button 
                  onClick={() => setActiveTab("all")}
                  className={`px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-colors ${activeTab === 'all' ? 'bg-brand-dark text-white' : 'bg-transparent text-brand-dark swiss-border hover:bg-brand-light'}`}
                >
                  ALL DAYS
                </button>
                {periodLength === 14 && (
                  <React.Fragment>
                    <button 
                      onClick={() => setActiveTab("week1")}
                      className={`px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-colors ${activeTab === 'week1' ? 'bg-brand-dark text-white' : 'bg-transparent text-brand-dark swiss-border hover:bg-brand-light'}`}
                    >
                      WEEK 1
                    </button>
                    <button 
                      onClick={() => setActiveTab("week2")}
                      className={`px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-colors ${activeTab === 'week2' ? 'bg-brand-dark text-white' : 'bg-transparent text-brand-dark swiss-border hover:bg-brand-light'}`}
                    >
                      WEEK 2
                    </button>
                  </React.Fragment>
                )}
                <button 
                  onClick={() => setActiveTab("payroll")}
                  className={`px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-colors ${activeTab === 'payroll' ? 'bg-brand-accent text-white' : 'bg-transparent text-brand-dark swiss-border hover:bg-brand-light'}`}
                >
                  PAYROLL
                </button>
              </div>
              <div className="flex gap-2">
                <button onClick={handleCopyClipboard} className="px-6 py-2 text-[10px] font-bold uppercase tracking-widest bg-brand-light swiss-border hover:bg-brand-dark hover:text-white transition-colors">
                  COPY
                </button>
                <button onClick={handleExportCSV} className="px-6 py-2 text-[10px] font-bold uppercase tracking-widest bg-brand-dark text-white hover:bg-black transition-colors">
                  EXPORT
                </button>
              </div>
            </section>

            {/* SPLITTER CARDS GRID */}
            <div className={`col-span-12 grid grid-cols-1 lg:grid-cols-2 gap-x-8 gap-y-12 ${activeTab === 'payroll' ? 'hidden no-print' : ''}`}>
              
              {/* WEEK 1 PANEL */}
              {(activeTab === "all" || activeTab === "week1") && (
                <div className="flex flex-col gap-12">
                  {processedDays.slice(0, 7).map((day) => {
                    const formattedDateStr = day.dateIso ? formatLocalDateString(day.dateIso) : day.dayLabel;
                    const isWeekendAdminWarning = shopName.toLowerCase().includes("phinney") && (day.dayLabel === "Saturday" || day.dayLabel === "Sunday");
                    
                    return (
                      <div key={`day-card-${day.dateIso}`} className="print-card border-t-4 border-brand-dark pt-4">
                        
                        <div className="flex justify-between items-end mb-4">
                          <div>
                            <h3 className="text-2xl font-bold uppercase tracking-tighter leading-none mb-2">{day.dayLabel}</h3>
                            <p className="text-[10px] font-bold uppercase tracking-widest text-brand-accent">{formattedDateStr}</p>
                          </div>
                          <div className="text-right">
                            <span className="block text-[10px] font-bold uppercase tracking-widest mb-1">POOL</span>
                            <span className="text-xl font-bold leading-none">${day.tipsVal.toFixed(2)}</span>
                          </div>
                        </div>

                        {/* Phinney Weekend Admin Warning */}
                        {isWeekendAdminWarning && (
                          <div className="mb-6 bg-red-50 text-red-900 border border-red-200 px-3 py-2 flex items-center gap-2">
                            <span className="w-2 h-2 bg-red-600 rounded-none inline-block"></span>
                            <span className="text-[9px] uppercase tracking-widest font-bold">ADJUST TIME IN TIP POOL FOR ADMIN SHIFTS</span>
                          </div>
                        )}

                        <table className="w-full text-left text-xs mb-6 mt-2">
                          <thead>
                            <tr className="swiss-border-b text-[10px] uppercase font-bold tracking-widest">
                              <th className="pb-3 w-1/3">SHIFT</th>
                              <th className="pb-3 w-1/3 pl-4">NAME</th>
                              <th className="pb-3 w-1/6 text-center">HRS</th>
                              <th className="pb-3 w-1/6 text-right">PAYOUT</th>
                              <th className="pb-3 w-8 no-print"></th>
                            </tr>
                          </thead>
                          <tbody>
                            {day.shifts.map((shift) => (
                              <tr key={shift.id} className="swiss-border-b group hover:bg-brand-light/50">
                                <td className="py-2">
                                  <input 
                                    type="text" 
                                    value={shift.shift}
                                    onChange={(e) => updateShift(day.dateIso, shift.id, 'shift', e.target.value)}
                                    className="w-full bg-transparent px-0 py-2 text-xs focus:bg-white"
                                  />
                                </td>
                                <td className="py-2 pl-4">
                                  <input 
                                    type="text"
                                    placeholder="N/A"
                                    value={shift.name}
                                    onChange={(e) => updateShift(day.dateIso, shift.id, 'name', e.target.value)}
                                    className="w-full bg-transparent px-0 py-2 text-xs font-bold focus:bg-white"
                                  />
                                </td>
                                <td className="py-2 text-center">
                                  <input 
                                    type="number"
                                    step="0.01"
                                    min="0"
                                    value={shift.hrs}
                                    onChange={(e) => updateShift(day.dateIso, shift.id, 'hrs', e.target.value)}
                                    className="w-full text-center bg-transparent px-0 py-2 text-xs focus:bg-white"
                                  />
                                </td>
                                <td className="py-2 text-right font-bold text-sm">
                                  ${shift.payout.toFixed(2)}
                                </td>
                                <td className="py-2 text-right no-print">
                                  <button onClick={() => deleteShift(day.dateIso, shift.id)} className="text-brand-dark opacity-0 group-hover:opacity-100 hover:text-red-600 font-bold px-2">✕</button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>

                        {day.shifts.length === 0 && (
                          <div className="text-[10px] uppercase font-bold tracking-widest py-4 mb-6 swiss-border-b">NO SHIFTS</div>
                        )}

                        <div className="flex justify-between items-end">
                          <button 
                            onClick={() => addCustomShift(day.dateIso)}
                            className="text-[10px] font-bold uppercase tracking-widest text-brand-dark hover:text-brand-accent no-print"
                          >
                            + ADD ROW
                          </button>
                          <div className="flex gap-6 text-xs font-bold">
                            <div><span className="text-[10px] uppercase tracking-widest text-brand-dark mr-2">HRS</span> {day.totalHours.toFixed(2)}</div>
                            <div className="flex items-center">
                              <span className="text-[10px] uppercase tracking-widest text-brand-dark mr-2">DIST</span> ${day.totalPaidOut.toFixed(2)}
                              {day.isBalanced && day.tipsVal > 0 ? (
                                <span className="ml-2 text-brand-accent" title="BALANCED">✓</span>
                              ) : day.tipsVal > 0 ? (
                                <span className="ml-2 text-red-600" title="IMBALANCE">!</span>
                              ) : null}
                            </div>
                          </div>
                        </div>

                      </div>
                    );
                  })}
                </div>
              )}

              {/* WEEK 2 PANEL */}
              {(periodLength === 14 && (activeTab === "all" || activeTab === "week2")) && (
                <div className="flex flex-col gap-12">
                  {processedDays.slice(7, 14).map((day) => {
                    const formattedDateStr = day.dateIso ? formatLocalDateString(day.dateIso) : day.dayLabel;
                    const isWeekendAdminWarning = shopName.toLowerCase().includes("phinney") && (day.dayLabel === "Saturday" || day.dayLabel === "Sunday");
                    
                    return (
                      <div key={`day-card-${day.dateIso}`} className="print-card border-t-4 border-brand-dark pt-4">
                        
                        <div className="flex justify-between items-end mb-4">
                          <div>
                            <h3 className="text-2xl font-bold uppercase tracking-tighter leading-none mb-2">{day.dayLabel}</h3>
                            <p className="text-[10px] font-bold uppercase tracking-widest text-brand-accent">{formattedDateStr}</p>
                          </div>
                          <div className="text-right">
                            <span className="block text-[10px] font-bold uppercase tracking-widest mb-1">POOL</span>
                            <span className="text-xl font-bold leading-none">${day.tipsVal.toFixed(2)}</span>
                          </div>
                        </div>

                        {/* Phinney Weekend Admin Warning */}
                        {isWeekendAdminWarning && (
                          <div className="mb-6 bg-red-50 text-red-900 border border-red-200 px-3 py-2 flex items-center gap-2">
                            <span className="w-2 h-2 bg-red-600 rounded-none inline-block"></span>
                            <span className="text-[9px] uppercase tracking-widest font-bold">ADJUST TIME IN TIP POOL FOR ADMIN SHIFTS</span>
                          </div>
                        )}

                        <table className="w-full text-left text-xs mb-6 mt-2">
                          <thead>
                            <tr className="swiss-border-b text-[10px] uppercase font-bold tracking-widest">
                              <th className="pb-3 w-1/3">SHIFT</th>
                              <th className="pb-3 w-1/3 pl-4">NAME</th>
                              <th className="pb-3 w-1/6 text-center">HRS</th>
                              <th className="pb-3 w-1/6 text-right">PAYOUT</th>
                              <th className="pb-3 w-8 no-print"></th>
                            </tr>
                          </thead>
                          <tbody>
                            {day.shifts.map((shift) => (
                              <tr key={shift.id} className="swiss-border-b group hover:bg-brand-light/50">
                                <td className="py-2">
                                  <input 
                                    type="text" 
                                    value={shift.shift}
                                    onChange={(e) => updateShift(day.dateIso, shift.id, 'shift', e.target.value)}
                                    className="w-full bg-transparent px-0 py-2 text-xs focus:bg-white"
                                  />
                                </td>
                                <td className="py-2 pl-4">
                                  <input 
                                    type="text"
                                    placeholder="N/A"
                                    value={shift.name}
                                    onChange={(e) => updateShift(day.dateIso, shift.id, 'name', e.target.value)}
                                    className="w-full bg-transparent px-0 py-2 text-xs font-bold focus:bg-white"
                                  />
                                </td>
                                <td className="py-2 text-center">
                                  <input 
                                    type="number"
                                    step="0.01"
                                    min="0"
                                    value={shift.hrs}
                                    onChange={(e) => updateShift(day.dateIso, shift.id, 'hrs', e.target.value)}
                                    className="w-full text-center bg-transparent px-0 py-2 text-xs focus:bg-white"
                                  />
                                </td>
                                <td className="py-2 text-right font-bold text-sm">
                                  ${shift.payout.toFixed(2)}
                                </td>
                                <td className="py-2 text-right no-print">
                                  <button onClick={() => deleteShift(day.dateIso, shift.id)} className="text-brand-dark opacity-0 group-hover:opacity-100 hover:text-red-600 font-bold px-2">✕</button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>

                        {day.shifts.length === 0 && (
                          <div className="text-[10px] uppercase font-bold tracking-widest py-4 mb-6 swiss-border-b">NO SHIFTS</div>
                        )}

                        <div className="flex justify-between items-end">
                          <button 
                            onClick={() => addCustomShift(day.dateIso)}
                            className="text-[10px] font-bold uppercase tracking-widest text-brand-dark hover:text-brand-accent no-print"
                          >
                            + ADD ROW
                          </button>
                          <div className="flex gap-6 text-xs font-bold">
                            <div><span className="text-[10px] uppercase tracking-widest text-brand-dark mr-2">HRS</span> {day.totalHours.toFixed(2)}</div>
                            <div className="flex items-center">
                              <span className="text-[10px] uppercase tracking-widest text-brand-dark mr-2">DIST</span> ${day.totalPaidOut.toFixed(2)}
                              {day.isBalanced && day.tipsVal > 0 ? (
                                <span className="ml-2 text-brand-accent" title="BALANCED">✓</span>
                              ) : day.tipsVal > 0 ? (
                                <span className="ml-2 text-red-600" title="IMBALANCE">!</span>
                              ) : null}
                            </div>
                          </div>
                        </div>

                      </div>
                    );
                  })}
                </div>
              )}

            </div>

            {/* PAYROLL SUMMARY */}
            <section className={`col-span-12 border-t-8 border-brand-dark pt-8 mt-12 ${activeTab === 'payroll' ? 'block' : 'hidden no-print'}`}>
              <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-4">
                <div>
                  <h2 className="text-4xl font-bold uppercase tracking-tighter leading-none mb-2">PAYROLL</h2>
                  <p className="text-[10px] font-bold uppercase tracking-widest text-brand-accent">Aggregated Period Summary</p>
                </div>
                <div className="flex gap-2 no-print">
                  <button onClick={handleCopyClipboard} className="px-6 py-3 text-[10px] font-bold uppercase tracking-widest swiss-border bg-brand-light hover:bg-brand-dark hover:text-white transition-colors">COPY</button>
                  <button onClick={handleExportCSV} className="px-6 py-3 text-[10px] font-bold uppercase tracking-widest bg-brand-dark text-white hover:bg-black transition-colors">EXPORT</button>
                </div>
              </div>

              <table className="w-full text-left text-sm mb-12">
                <thead>
                  <tr className="swiss-border-b-heavy text-[10px] uppercase font-bold tracking-widest">
                    <th className="pb-4">NAME</th>
                    <th className="pb-4 text-center">SHIFTS</th>
                    <th className="pb-4 text-center">HOURS</th>
                    <th className="pb-4 text-right">RATE</th>
                    <th className="pb-4 text-right">TOTAL PAYOUT</th>
                  </tr>
                </thead>
                <tbody>
                  {payrollAggregation.baristas.map((barista) => {
                    const effRate = barista.totalHours > 0 ? (barista.totalPayout / barista.totalHours).toFixed(2) : "0.00";
                    return (
                      <tr key={`payroll-${barista.name}`} className="swiss-border-b">
                        <td className="py-4 font-bold text-base">{barista.name}</td>
                        <td className="py-4 text-center">{barista.shiftsCount}</td>
                        <td className="py-4 text-center font-bold">{barista.totalHours.toFixed(2)}</td>
                        <td className="py-4 text-right text-[10px] uppercase tracking-widest">${effRate}/H</td>
                        <td className="py-4 text-right font-bold text-lg">${barista.totalPayout.toFixed(2)}</td>
                      </tr>
                    );
                  })}
                  {payrollAggregation.unnamed.totalPayout > 0 && (
                    <tr className="swiss-border-b bg-brand-light/50">
                      <td className="py-4 font-bold italic">[UNNAMED]</td>
                      <td className="py-4 text-center">-</td>
                      <td className="py-4 text-center font-bold">{payrollAggregation.unnamed.totalHours.toFixed(2)}</td>
                      <td className="py-4 text-right">-</td>
                      <td className="py-4 text-right font-bold text-lg">${payrollAggregation.unnamed.totalPayout.toFixed(2)}</td>
                    </tr>
                  )}
                </tbody>
                <tfoot>
                  <tr className="swiss-border-t-heavy">
                    <td className="py-6 font-bold uppercase tracking-widest">GRAND TOTAL</td>
                    <td className="py-6 text-center"></td>
                    <td className="py-6 text-center font-bold text-lg">
                      {(payrollAggregation.baristas.reduce((acc, b) => acc + b.totalHours, 0) + payrollAggregation.unnamed.totalHours).toFixed(2)}
                    </td>
                    <td className="py-6 text-right"></td>
                    <td className="py-6 text-right font-bold text-2xl">${totals.grandTotal.toFixed(2)}</td>
                  </tr>
                </tfoot>
              </table>
            </section>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
